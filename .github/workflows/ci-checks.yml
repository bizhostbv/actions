name: ci-checks
# Reusable lint/test/SAST gate. Called by app repos on PR + branch push, and as a
# blocking needs: job before release build. Fail-closed: anything red blocks merge/build.
on:
  workflow_call:
    inputs:
      stack:        { required: true,  type: string }            # node | php
      node_version: { required: false, type: string, default: "22" }
      php_version:  { required: false, type: string, default: "8.3" }
      runs_on:      { required: false, type: string, default: "ubuntu-latest" }
      workdir:      { required: false, type: string, default: "." }
      # Optional throwaway test database (php). Off by default; opt in with db: mysql
      # for repos whose phpunit suite boots the kernel against a real DB. The schema is
      # the app's responsibility (e.g. tests/bootstrap.php runs doctrine:schema:update).
      db:            { required: false, type: string, default: "" }          # "" | mysql
      db_image:      { required: false, type: string, default: "mysql:8.4" }
      db_name:       { required: false, type: string, default: "app_test" }
      db_user:       { required: false, type: string, default: "app" }
      db_password:   { required: false, type: string, default: "app" }
      db_host_alias: { required: false, type: string, default: "" }          # /etc/hosts name -> 127.0.0.1 (match the app's forced DATABASE_URL host)

# Least-privilege: this gate only reads the repo. Reusable workflows inherit the
# caller's token permissions unless pinned here.
permissions:
  contents: read

jobs:
  checks:
    runs-on: ${{ inputs.runs_on }}
    defaults:
      run:
        working-directory: ${{ inputs.workdir }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        if: inputs.stack == 'node'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: "${{ inputs.node_version }}", cache: npm }
      - name: Node lint / test / build
        if: inputs.stack == 'node'
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm test --if-present
          npm run build --if-present

      - name: Start throwaway test database (php, opt-in)
        if: inputs.stack == 'php' && inputs.db == 'mysql'
        env:
          DB_IMAGE: ${{ inputs.db_image }}
          DB_NAME: ${{ inputs.db_name }}
          DB_USER: ${{ inputs.db_user }}
          DB_PASSWORD: ${{ inputs.db_password }}
          DB_HOST_ALIAS: ${{ inputs.db_host_alias }}
        run: |
          set -euo pipefail
          docker run -d --name ci-mysql -p 3306:3306 \
            -e MYSQL_ROOT_PASSWORD=root \
            -e MYSQL_DATABASE="$DB_NAME" \
            -e MYSQL_USER="$DB_USER" \
            -e MYSQL_PASSWORD="$DB_PASSWORD" \
            "$DB_IMAGE"
          # Let the app's forced DATABASE_URL host (e.g. a docker-compose service name)
          # resolve to the service published on localhost.
          if [ -n "$DB_HOST_ALIAS" ]; then
            echo "127.0.0.1 $DB_HOST_ALIAS" | sudo tee -a /etc/hosts >/dev/null
          fi
          echo "waiting for mysql to accept connections..."
          for _ in $(seq 1 60); do
            if docker exec ci-mysql mysqladmin ping -uroot -proot --silent 2>/dev/null; then
              echo "mysql ready"; break
            fi
            sleep 2
          done

      - name: Setup PHP
        if: inputs.stack == 'php'
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with: { php-version: "${{ inputs.php_version }}", tools: composer }
      - name: PHP static analysis / tests
        if: inputs.stack == 'php'
        run: |
          set -euo pipefail
          composer install --no-interaction --prefer-dist
          # Prefer the composer `lint` script; fall back to phpstan only when it is
          # absent. The previous `lint || phpstan` masked real lint failures (a
          # failing lint silently fell through to phpstan), breaking fail-closed.
          if composer run-script --list 2>/dev/null | grep -qE '^\s*lint\b'; then
            composer run-script lint --no-interaction
          else
            vendor/bin/phpstan analyse
          fi
          vendor/bin/phpunit

      - name: SAST (semgrep)
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with: { config: "p/ci" }
