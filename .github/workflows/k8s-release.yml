name: k8s-release
# Reusable immutable release pipeline for any container app on K8s.
# Caller triggers on push to release/vX.Y.Z. Build one immutable :X.Y.Z, push it,
# then write that tag into the GitOps repo (acc) so ArgoCD auto-syncs. No moving tags.
on:
  workflow_call:
    inputs:
      project:     { required: true,  type: string }   # Harbor project
      app:         { required: true,  type: string }   # image/app name
      dockerfile:  { required: false, type: string, default: Dockerfile }
      context:     { required: false, type: string, default: . }
      build_args:  { required: false, type: string, default: '' }   # space-separated KEY=VALUE pairs
      registry:    { required: false, type: string, default: '' }   # override; else vars.HARBOR_REGISTRY (acc/prod differ)
      gitops_repo: { required: false, type: string, default: 'git@github.com:bizhostbv/k8s-hotel-cluster-gitops.git' }
      values_file: { required: false, type: string, default: '' }   # override; else values/acc/<app>.yaml
      tag_key:     { required: false, type: string, default: '.image.tag' }   # yq path to the image tag to set
    secrets:
      gitops_deploy_key: { required: true }

concurrency:
  group: release-${{ github.repository }}-${{ inputs.app }}   # per-app: matrix services coexist; same app serializes
  cancel-in-progress: false

jobs:
  release:
    runs-on: [self-hosted, harbor-builder]
    steps:
      - uses: actions/checkout@v4

      - name: Derive & validate version + resolve registry
        id: ver
        run: |
          set -euo pipefail
          REG="${{ inputs.registry }}"
          [ -z "$REG" ] && REG="${{ vars.HARBOR_REGISTRY }}"
          [ -z "$REG" ] && { echo "::error::No registry: set the HARBOR_REGISTRY variable or pass the 'registry' input"; exit 1; }
          v="${GITHUB_REF#refs/heads/release/v}"
          if ! printf '%s' "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Branch must be release/vMAJOR.MINOR.PATCH (got '$GITHUB_REF')"; exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "image=$REG/${{ inputs.project }}/${{ inputs.app }}:$v" >> "$GITHUB_OUTPUT"

      - name: Guard — version must not already exist (immutable, no reuse)
        run: |
          set -euo pipefail
          if skopeo inspect "docker://${{ steps.ver.outputs.image }}" >/dev/null 2>&1; then
            echo "::error::${{ steps.ver.outputs.image }} already exists — versions are immutable. Bump the semver."; exit 1
          fi

      - name: Build & push immutable image
        run: |
          set -euo pipefail
          BA=""
          for kv in ${{ inputs.build_args }}; do BA="$BA --build-arg $kv"; done
          buildah bud --layers --isolation chroot $BA \
            -f "${{ inputs.dockerfile }}" -t "${{ steps.ver.outputs.image }}" "${{ inputs.context }}"
          buildah push "${{ steps.ver.outputs.image }}"

      - name: Write immutable tag into GitOps (acc) — race-safe
        env:
          GIT_SSH_COMMAND: ssh -i /tmp/gitops-ci -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new
        run: |
          set -euo pipefail
          install -m600 /dev/stdin /tmp/gitops-ci <<< "${{ secrets.gitops_deploy_key }}"
          VF="${{ inputs.values_file }}"; [ -z "$VF" ] && VF="values/acc/${{ inputs.app }}.yaml"
          rm -rf /tmp/gitops && git clone --quiet "${{ inputs.gitops_repo }}" /tmp/gitops
          cd /tmp/gitops
          git config user.name 'gitops-ci'; git config user.email 'gitops-ci@k8s-hotel'
          pushed=0
          for attempt in 1 2 3 4 5; do
            git fetch -q origin main
            git reset --hard -q origin/main
            yq -i "${{ inputs.tag_key }} = \"${{ steps.ver.outputs.version }}\"" "$VF"
            if git diff --quiet; then echo "tag already ${{ steps.ver.outputs.version }}"; pushed=1; break; fi
            git commit -aqm "release(acc/${{ inputs.app }}): ${{ steps.ver.outputs.version }}"
            if git push -q origin HEAD:main; then echo "pushed on attempt $attempt"; pushed=1; break; fi
            echo "push race, retry $attempt"; sleep $((RANDOM % 4 + 1))
          done
          rm -f /tmp/gitops-ci
          [ "$pushed" = 1 ] || { echo "::error::Could not write tag to gitops after retries"; exit 1; }

      - name: Summary
        run: echo "Released ${{ steps.ver.outputs.image }} -> acc via gitops (ArgoCD auto-syncs). Promote to prod via reviewed gitops PR." >> "$GITHUB_STEP_SUMMARY"
