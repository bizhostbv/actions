image:
  # Registry differs per env (acc/prod) — set the full repository in the gitops
  # values/<env>/<app>.yaml. This is only a placeholder default.
  repository: REGISTRY/PROJECTNAME/APPNAME
  tag: "0.0.0"          # overridden per-env by gitops values
  pullPolicy: IfNotPresent
replicaCount: 1
service:
  port: 80
  targetPort: 8080
resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits:   { cpu: 500m, memory: 256Mi }
